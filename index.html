        *, *::before, *::after {

            }

                width: 100%;

            }

            /* Checkout mobile: reduz exageros visuais sem perder identidade */

                padding-left: 12px !important;
                padding-right: 12px !important;
            }

            form {
                padding: 24px 18px !important;
                gap: 18px !important;
            }

            form > div {
                max-width: 100%;
            }

            input,
            textarea,
            select {
                font-size: 16px !important;
                min-height: 50px;
            }

            label {
                line-height: 1.25 !important;
            }

            button,
            a {
                -webkit-tap-highlight-color: transparent;
            }

            button[type="submit"] {
                padding-top: 20px !important;
                padding-bottom: 20px !important;
                border-radius: 28px !important;
                font-size: 19px !important;
                line-height: 1.15 !important;
                gap: 10px !important;
                text-align: center;
                white-space: normal;
            }

            button[type="submit"] svg {
                width: 26px !important;
                height: 26px !important;
                flex-shrink: 0;
            }

            .rounded-\[4rem\] {
                border-radius: 32px !important;
            }

            .rounded-\[3rem\] {
                border-radius: 28px !important;
            }

            .rounded-\[2\.5rem\] {
                border-radius: 24px !important;
            }

            .rounded-\[2rem\] {
                border-radius: 22px !important;
            }

            .tracking-widest {
                letter-spacing: 0.08em !important;
            }

            .shadow-2xl {
                box-shadow: 0 18px 45px rgba(15, 23, 42, 0.12) !important;
            }
        }
    </style>
    
    <!-- Proteção de valores monetários antes de enviar ao Supabase -->
    <script>
        (function () {
            function normalizeMoneyValue(value) {
                if (value === null || value === undefined || value === '') return 0;
                if (typeof value === 'number') return Number.isFinite(value) ? value : 0;

                var cleaned = String(value)
                    .replace(/R\$/gi, '')
                    .replace(/\s/g, '')
                    .replace(/[^0-9,.-]/g, '');

                if (!cleaned) return 0;

                var hasComma = cleaned.indexOf(',') !== -1;
                var hasDot = cleaned.indexOf('.') !== -1;

                if (hasComma && hasDot) {
                    cleaned = cleaned.replace(/\./g, '').replace(',', '.');
                } else if (hasComma) {
                    cleaned = cleaned.replace(',', '.');
                }

                var parsed = Number(cleaned);
                return Number.isFinite(parsed) ? parsed : 0;
            }

            function normalizePaidAmountInPayload(payload) {
                if (!payload || typeof payload !== 'object') return payload;

                if (Array.isArray(payload)) {
                    return payload.map(normalizePaidAmountInPayload);
                }

                var next = Object.assign({}, payload);
                if (Object.prototype.hasOwnProperty.call(next, 'paid_amount')) {
                    next.paid_amount = normalizeMoneyValue(next.paid_amount);
                }

                return next;
            }

            var originalFetch = window.fetch;
            window.fetch = function (input, init) {
                try {
                    var url = typeof input === 'string' ? input : (input && input.url) || '';
                    var method = (init && init.method ? init.method : '').toUpperCase();
                    var body = init && init.body;
                    var isSupabaseLeadWrite = url.indexOf('supabase.co') !== -1 && url.indexOf('/leads') !== -1 && ['POST', 'PATCH', 'PUT'].indexOf(method) !== -1;

                    if (isSupabaseLeadWrite && typeof body === 'string' && body.indexOf('paid_amount') !== -1) {
                        var parsedBody = JSON.parse(body);
                        var normalizedBody = normalizePaidAmountInPayload(parsedBody);
                        init = Object.assign({}, init, { body: JSON.stringify(normalizedBody) });
                    }
                } catch (error) {
                    console.warn('Falha ao normalizar paid_amount antes do envio:', error);
                }

                return originalFetch.apply(this, arguments.length > 1 ? [input, init] : [input]);
            };
        })();
    </script>
