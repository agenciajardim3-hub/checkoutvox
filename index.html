
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Checkout Seguro | Rodrigo Mesquita</title>
    
    <!-- Performance: Preconnect to external domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://emdsgvuqrhpjdgrgaslo.supabase.co">
    <link rel="preconnect" href="https://cdn.tailwindcss.com">
    
    <!-- Performance: DNS prefetch for Pixel -->
    <link rel="dns-prefetch" href="https://connect.facebook.net">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            min-height: 100%;
            overflow-x: hidden;
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        img, svg, video, canvas {
            max-width: 100%;
        }

        input, select, textarea, button {
            font-family: inherit;
        }

        @media (max-width: 640px) {
            body {
                background-color: #f1f5f9;
            }

            #root {
                width: 100%;
                overflow-x: hidden;
            }

            /* Checkout mobile: reduz exageros visuais sem perder identidade */
            #root > div {
                padding-left: 12px !important;
                padding-right: 12px !important;
            }

            form {
                padding: 24px 18px !important;
                gap: 18px !important;
            }

            form > div {
                max-width: 100%;
            }

            input,
            textarea,
            select {
                font-size: 16px !important;
                min-height: 50px;
            }

            label {
                line-height: 1.25 !important;
            }

            button,
            a {
                -webkit-tap-highlight-color: transparent;
            }

            button[type="submit"] {
                padding-top: 20px !important;
                padding-bottom: 20px !important;
                border-radius: 28px !important;
                font-size: 19px !important;
                line-height: 1.15 !important;
                gap: 10px !important;
                text-align: center;
                white-space: normal;
            }

            button[type="submit"] svg {
                width: 26px !important;
                height: 26px !important;
                flex-shrink: 0;
            }

            .rounded-\[4rem\] {
                border-radius: 32px !important;
            }

            .rounded-\[3rem\] {
                border-radius: 28px !important;
            }

            .rounded-\[2\.5rem\] {
                border-radius: 24px !important;
            }

            .rounded-\[2rem\] {
                border-radius: 22px !important;
            }

            .tracking-widest {
                letter-spacing: 0.08em !important;
            }

            .shadow-2xl {
                box-shadow: 0 18px 45px rgba(15, 23, 42, 0.12) !important;
            }
        }
    </style>
    
    <!-- Meta Pixel Code -->
    <script>
        !function(f,b,e,v,n,t,s)
        {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
        n.callMethod.apply(n,arguments):n.queue.push(arguments)};
        if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
        n.queue=[];t=b.createElement(e);t.async=!0;
        t.src=v;s=b.getElementsByTagName(e)[0];
        s.parentNode.insertBefore(t,s)}(window, document,'script',
        'https://connect.facebook.net/en_US/fbevents.js');
    </script>

</head>
<body>
    <div id="root"></div>
    <!-- Esta linha é essencial para o Vercel carregar o app -->
    <script type="module" src="./index.tsx"></script>
</body>
</html>
